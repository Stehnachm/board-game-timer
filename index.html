<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Game Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen active">
    <div class="container">
      <h1>Board Game Timer</h1>

      <div class="field-group">
        <label for="player-count">Number of Players</label>
        <div class="stepper">
          <button id="count-down" class="stepper-btn" aria-label="Decrease">&#8722;</button>
          <span id="player-count-display">2</span>
          <button id="count-up" class="stepper-btn" aria-label="Increase">&#43;</button>
        </div>
      </div>

      <div id="player-names" class="player-names"></div>

      <button id="btn-start" class="btn btn-primary btn-large">Start Game</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <div class="container">

      <div class="total-timer-bar">
        <span class="label">Total Game Time</span>
        <span id="total-time" class="total-time">00:00:00</span>
      </div>

      <div class="active-player-card">
        <div class="turn-label">Current Turn</div>
        <div id="active-player-name" class="active-player-name">Player 1</div>
        <div id="active-player-time" class="active-player-time">00:00:00</div>
      </div>

      <button id="btn-end-turn" class="btn btn-primary btn-large btn-end-turn">
        End Turn
      </button>

      <div class="scoreboard">
        <h2>Turn Times</h2>
        <div id="scoreboard-list" class="scoreboard-list"></div>
      </div>

      <button id="btn-end-game" class="btn btn-secondary">End Game</button>
    </div>
  </div>

  <!-- SUMMARY SCREEN -->
  <div id="screen-summary" class="screen">
    <div class="container">
      <h1>Game Over</h1>

      <div class="summary-total">
        <span class="label">Total Game Time</span>
        <span id="summary-total-time" class="summary-time">00:00:00</span>
      </div>

      <h2>Player Summary</h2>
      <div id="summary-list" class="summary-list"></div>

      <button id="btn-new-game" class="btn btn-primary btn-large">New Game</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
